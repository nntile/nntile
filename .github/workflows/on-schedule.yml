name: Nightly build

on:
  schedule:
    # Every night at 3 am.
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  lint:
    name: Linting with Python ${{ matrix.python-version }}
    runs-on: 'ubuntu-24.04'
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          cache: 'pip'
          python-version: ${{ matrix.python-version }}
      - name: Run pre-commit on merge
        uses: pre-commit/action@v3.0.0

  build:
    name: Build a CPU-only extension for Python ${{ matrix.python-version }}
    needs: 'lint'
    runs-on: 'ubuntu-24.04'
    strategy:
      matrix:
        python-version: ['3.12']
    container:
      image: ubuntu:24.04
    env:
      CCACHE_DIR: /tmp/ccache
      PKG_CONFIG_PATH: /opt/starpu/lib/pkgconfig
      LD_LIBRARY_PATH: /opt/starpu/lib
    steps:
      - name: Cache system packages
        id: cache-apt
        uses: actions/cache@v5
        env:
          cache-name: cache-apt-packages
        with:
          path: /var/cache/apt
          key: ${{ runner.os }}-build-${{ env.cache-name }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}
            ${{ runner.os }}-build-
            ${{ runner.os }}
      - name: Install system dependencies
        run: |
          rm -rfv /etc/apt/apt.conf.d/docker*
          apt update
          apt install -y --no-install-recommends \
              autoconf automake binutils build-essential ca-certificates \
              ccache clang cmake curl fxt-tools gdb git lcov libfxt-dev \
              libhwloc-dev libopenblas-dev libopenmpi-dev libopenmpi3 \
              libtool-bin lsb-release ninja-build openmpi-bin pkg-config \
              sqlite3
      - name: Cache StarPU
        id: cache-starpu
        uses: actions/cache@v5
        with:
          path: /opt/starpu
          key: starpu-1.4.8-${{ runner.os }}-v2
      - name: Build StarPU from source
        if: steps.cache-starpu.outputs.cache-hit != 'true'
        run: |
          export STARPU_VERSION=starpu-1.4.8
          export STARPU_LABEL=$STARPU_VERSION
          mkdir -p /usr/src
          curl -SL https://gitlab.inria.fr/starpu/starpu/-/archive/$STARPU_LABEL/starpu-$STARPU_LABEL.tar.gz | tar -xzC /usr/src
          ln -s /usr/src/starpu-$STARPU_LABEL /usr/src/starpu
          cd /usr/src/starpu
          ./autogen.sh
          ./configure \
              --disable-build-doc \
              --disable-build-examples \
              --disable-build-tests \
              --disable-fortran \
              --disable-opencl \
              --disable-socl \
              --disable-starpufft \
              --disable-starpupy \
              --enable-blas-lib=none \
              --enable-maxcudadev=8 \
              --enable-maxbuffers=16 \
              --with-fxt \
              --prefix=/opt/starpu \
              --libdir=/opt/starpu/lib
          make -j 4 install
          rm -rf /usr/src/starpu /usr/src/starpu-$STARPU_LABEL
      - name: Verify StarPU installation
        run: |
          ls /opt/starpu/lib/pkgconfig/starpu-1.4.pc
          PKG_CONFIG_PATH=/opt/starpu/lib/pkgconfig pkg-config --modversion starpu-1.4
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Python dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          $HOME/.local/bin/uv pip install --system \
            torch --index-url https://download.pytorch.org/whl/cpu
          $HOME/.local/bin/uv pip install --system \
            numpy safetensors "transformers<4.53"
      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: /tmp/ccache
          key: ccache-nightly-${{ runner.os }}-${{ matrix.python-version }}-${{ github.sha }}
          restore-keys: |
            ccache-nightly-${{ runner.os }}-${{ matrix.python-version }}-
            ccache-${{ runner.os }}-${{ matrix.python-version }}-
      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache --zero-stats
      - name: Build NNTile native libraries
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DUSE_CUDA=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH=$(python3 -c 'import torch; print(torch.utils.cmake_prefix_path)')
          cmake --build build -j
      - name: Show ccache stats
        if: always()
        run: ccache --show-stats
      - name: Upload all shared objects (*.so)
        uses: actions/upload-artifact@v7
        with:
          name: shared-objects-${{ matrix.python-version }}
          path: build/**/*.so
          retention-days: 7
      - name: Run all C++ tests
        run: |
          ctest --test-dir build -E wrappers -LE "(MPI|NotImplemented)" --output-on-failure

  test-python:
    name: Run CPU-only tests with Python ${{ matrix.python-version }}
    needs: 'build'
    runs-on: 'ubuntu-24.04'
    strategy:
      matrix:
        python-version: ['3.12']
    container:
      image: 'ubuntu:24.04'
    env:
      LD_LIBRARY_PATH: /opt/starpu/lib
    steps:
      - uses: actions/checkout@v6
      - name: Cache system packages
        uses: actions/cache@v5
        id: cache-apt
        env:
          cache-name: cache-apt-packages
        with:
          path: /var/cache/apt
          key: ${{ runner.os }}-build-${{ env.cache-name }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}
            ${{ runner.os }}-build-
            ${{ runner.os }}
      - name: Install system dependencies
        run: |
          rm -rfv /etc/apt/apt.conf.d/docker*
          apt update
          apt install -y --no-install-recommends \
              binutils build-essential ca-certificates \
              clang cmake curl libfxt-dev git lcov libhwloc-dev \
              libopenblas-dev libopenmpi-dev libopenmpi3 \
              lsb-release ninja-build openmpi-bin pkg-config sqlite3
      - name: Restore StarPU cache
        uses: actions/cache@v5
        with:
          path: /opt/starpu
          key: starpu-1.4.8-${{ runner.os }}-v2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Download all shared objects (*.so)
        uses: actions/download-artifact@v8
        with:
          name: shared-objects-${{ matrix.python-version }}
          path: build
      # TODO(@daskol): We should not remove platform tag and rework extension
      # build in general.
      - name: Make in-tree symlink to an extension
        run: |
          ln -rs \
            build/wrappers/python/nntile/nntile_core.so \
            wrappers/python/nntile/nntile_core.so
          ln -rs \
            build/wrappers/python/nntile/nntile_graph.so \
            wrappers/python/nntile/nntile_graph.so
      # TODO(@daskol): We should rely on `uv` or any other package managing
      # utility here.
      - name: Install Python dependencies
        run: |
          # Use `uv` for syncing dependencies directly from `pyproject.toml`
          # (but without`uv.lock` file at the moment).
          python -m pip install uv --root-user-action=ignore
          uv sync --extra ci --extra test \
            --no-install-project --no-build-isolation \
            --default-index https://download.pytorch.org/whl/cpu \
            --index https://download.pytorch.org/whl/cpu \
            --index https://pypi.org/simple \
            --index-strategy unsafe-best-match
      - name: Run all tests with PyTest
        run: |
          . .venv/bin/activate
          export PYTHON_TAG=$(
            python -c 'import sys; print(sys.implementation.cache_tag)')
          export PYTHONPATH=$PWD/wrappers/python:$PYTHONPATH
          pytest -vv \
            --cov=wrappers/python/nntile \
            --cov-report=html:coverage/html/${PYTHON_TAG} \
            --cov-report=xml:coverage/xml/report.${PYTHON_TAG}.xml \
            --junitxml=pytest/report.${PYTHON_TAG}.xml
      - name: Upload PyTest report for Python ${{ matrix.python-version }}
        uses: actions/upload-artifact@v7
        with:
          name: pytest-report
          path: |
            coverage
            pytest
      # This step never fails but it is useful to monitor status of type
      # corectness.
      - name: Run type checking
        run: |
          . .venv/bin/activate
          mypy wrappers/python/nntile || true
